name: Hermes-shops Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "hermes-shops-v*"

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            desktop/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[web,dev,cron,pty,mcp,acp,honcho]"

      - name: Install root browser dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build web frontend
        run: npm --prefix web run build

      - name: Run desktop sidecar tests
        run: python -m pytest tests/hermes_server/test_app_factory.py tests/hermes_cli/test_web_server.py -q

      - name: Build desktop installers
        run: npm --prefix desktop run dist

      - name: Collect release assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path("desktop/dist/electron")
          out = root / "release-assets"
          out.mkdir(parents=True, exist_ok=True)

          patterns = [
              "Hermes-shops-*.dmg",
              "Hermes-shops-*.zip",
              "Hermes-shops-*.exe",
              "Hermes-shops-*.blockmap",
              "latest*.yml",
              "latest*.yaml",
          ]

          copied = []
          seen = set()
          for pattern in patterns:
              for path in sorted(root.glob(pattern)):
                  if not path.is_file() or path.name in seen:
                      continue
                  shutil.copy2(path, out / path.name)
                  copied.append(path.name)
                  seen.add(path.name)

          if not copied:
              raise SystemExit(f"No release assets found under {root}")

          print("Collected release assets:")
          for name in copied:
              print(f" - {name}")
          PY

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-shops-${{ matrix.os }}
          path: desktop/dist/electron/release-assets/*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/hermes-shops-v')
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release-artifacts/*
